<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Application bt J.F Vecina</title>
  </head>
  <body class="w-full bg-primary-bg text-secondary-text flex flex-col gap-5 px-4 lg:max-w-[1200px] lg:mx-auto lg:bg-body-bg lg:min-h-screen">
      <header class="flex flex-col gap-8 pt-8 py-5" data-content="header">
        <div class="" data-content="top_header">
          <h1 class="text-3xl text-primary-text font-bold lg:text-5xl">Movie Vault <span class="text-sm text-secondary-text font-normal text-xs lg:text-base"> by John Francis Vecina</span></h1>
          <p class="text-sm lg:text-base">Discover you next favorite film</p>
        </div>
        <div class="flex flex-col gap-3">
          <div class="flex items-center gap-3">
            <input type="text" class="border border-tertiary-bg bg-secondary-bg p-2 w-12/16 rounded-lg text-sm lg:py-4 lg:px-3 lg:w-7/8" placeholder="Search movies, series etc." data-content="movie_search">
            <button class="flex justify-center items-center gap-1 w-3/16 bg-secondary-bg p-2.5 px-5 border border-tertiary-bg rounded-lg text-sm lg:w-1/16 lg:py-4" data-button="watch_list">
              <div class="flex">( <span class="" data-content="saved_movie">0</span> )</div>
              <img src="src/assets/menu.svg" alt="" class="invert w-4 opacity-60">
            </button>
          </div>
          <div class="flex gap-2" data-content="user_input">
                <button class="flex gap-2 items-center bg-secondary-bg px-3 py-1.5 rounded-lg text-xs border border-tertiary-bg transition-all hover:bg-tertiary-bg lg:px-6 lg:py-2 lg:text-sm" data-content="top_button" data-button="movies">
                  <img src="src/assets/movie.svg" alt="" class="w-3 invert opacity-60 lg:w-4">
                  Movies
                </button>
                <button class="flex gap-2 items-center bg-secondary-bg px-3 py-1.5 rounded-lg text-xs border border-tertiary-bg transition-all hover:bg-tertiary-bg lg:px-6 lg:py-2 lg:text-sm" data-content="top_button" data-button="series">
                  <img src="src/assets/series.svg" alt="" class="w-3 invert opacity-60 lg:w-4">
                  Series
                </button>
                <select class="flex justify-center items-center bg-secondary-bg w-28 py-1.5 rounded-lg text-xs border border-tertiary-bg transition-all hover:bg-tertiary-bg lg:px-6 lg:py-2 lg:text-sm" data-content="top_button" data-button="categories">
                  <option disabled selected class="bg-secondary-bg flex justify-center">Genre</option>
                  <option value="" class="bg-secondary-bg ">Action</option>
                  <option value="" class="bg-secondary-bg ">Adventure</option>
                  <option value="" class="bg-secondary-bg ">Comedy</option>
                  <option value="" class="bg-secondary-bg ">Drama</option>
                  <option value="" class="bg-secondary-bg ">Romance</option>
                </select>
            </div>
        </div>
      </header>

      <main class="flex flexcol items-center justify-center relative" data-content="current_screen">
          <div class="flex flex-wrap gap-4 w-full pb-16 min-h-screen" data-content="movie_container">

          </div>
          <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
            <div class="animate-spin h-10 w-10 border-3 border-blue-500 border-t-transparent rounded-full hidden" data-content="loading_screen"></div>
          </div>
            
      </main> 

    <script type="module" src="src/main.js"></script>
  </body>
</html>
